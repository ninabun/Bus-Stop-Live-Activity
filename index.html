<!doctype html>
<html lang="zh-Hant-HK">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07111f">
    <meta name="description" content="1/12 real-time Hong Kong bus stop departure display with weather, adverts and station settings.">
    <title>巴士站班次顯示器</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="kiosk-shell">
      <section class="display-frame" aria-label="巴士站班次顯示器">
        <div class="display-glass">
          <header class="display-top">
            <div>
              <p class="eyebrow">1/12 SCALE SMART BUS STOP</p>
              <h1 id="activeStopName">巴士站班次顯示器</h1>
            </div>
            <div class="status-cluster">
              <span class="status-pill online" id="networkStatus">WiFi 已連線</span>
              <span class="status-pill" id="refreshStatus">每 1 分鐘更新</span>
            </div>
          </header>

          <section class="hero-grid">
            <article class="departure-board">
              <div class="board-toolbar">
                <div>
                  <p class="section-label">實時班次</p>
                  <strong id="directionLabel">全部方向</strong>
                </div>
                <select id="displayMode" aria-label="顯示模式">
                  <option value="all">所有方向</option>
                  <option value="outbound">只顯示去程</option>
                  <option value="inbound">只顯示回程</option>
                  <option value="favourites">只顯示已選路線</option>
                </select>
              </div>
              <div class="route-list" id="routeList" aria-live="polite"></div>
            </article>

            <aside class="side-stack">
              <article class="weather-panel">
                <div>
                  <p class="section-label">天氣</p>
                  <h2 id="weatherTemp">--°C</h2>
                  <p id="weatherText">連接天文台中</p>
                </div>
                <div class="weather-meta">
                  <span id="humidityText">濕度 --%</span>
                  <span id="warningText">警告：--</span>
                </div>
              </article>

              <article class="ad-panel">
                <p class="section-label">廣告</p>
                <div class="ad-visual">
                  <span>HK</span>
                  <strong>下一站，準時生活</strong>
                </div>
                <p id="adCopy">智能站牌、實時班次、天氣警告同步顯示。</p>
              </article>

              <article class="countdown-panel">
                <p class="section-label">節日倒數</p>
                <h2 id="holidayCountdown">-- 日</h2>
                <p id="holidayName">計算下一個公眾假期</p>
              </article>
            </aside>
          </section>

          <footer class="display-footer">
            <span id="clockText">--:--:--</span>
            <span id="lastUpdated">最後更新：--</span>
            <span>資料：九巴 / 城巴 / 香港天文台</span>
          </footer>
        </div>
      </section>

      <aside class="control-panel" aria-label="設定">
        <div class="panel-head">
          <div>
            <p class="eyebrow">CONTROL</p>
            <h2>站點設定</h2>
          </div>
          <button class="icon-button" id="toggleSettings" type="button" aria-label="收合設定">⚙</button>
        </div>

        <div class="settings-body" id="settingsBody">
          <label class="field">
            <span>目前站點</span>
            <select id="stopSelect"></select>
          </label>

          <div class="field-row">
            <label class="field">
              <span>名稱</span>
              <input id="stopNameInput" maxlength="28" placeholder="例如：旺角站">
            </label>
            <label class="field">
              <span>營辦商</span>
              <select id="operatorInput">
                <option value="kmb">九巴</option>
                <option value="ctb">城巴</option>
                <option value="mixed">九巴 + 城巴</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>九巴站點 ID</span>
            <input id="kmbStopInput" placeholder="KMB stop id">
          </label>

          <label class="field">
            <span>城巴站點 ID</span>
            <input id="ctbStopInput" placeholder="Citybus stop id">
          </label>

          <label class="field">
            <span>顯示路線，以逗號分隔</span>
            <input id="routesInput" placeholder="1, 6, 101, 970X">
          </label>

          <div class="button-row">
            <button id="saveStop" type="button">儲存站點</button>
            <button id="addStop" type="button">新增站點</button>
            <button id="deleteStop" type="button">刪除</button>
          </div>

          <div class="button-row">
            <button id="refreshNow" type="button">立即更新</button>
            <button id="demoData" type="button">示範資料</button>
          </div>

          <p class="hint">最多可儲存十個巴士站。填入真實站點 ID 後，系統會每分鐘嘗試更新班次。</p>
        </div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
