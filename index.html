<!doctype html>
<html lang="zh-Hant-HK">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#06101f">
    <meta name="description" content="全港巴士、小巴及叫車資訊顯示器，適合 iPad、公司大堂及公共 display 使用。">
    <title>全港交通資訊台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="kiosk">
        <header class="topbar">
          <div>
            <p class="eyebrow">HONG KONG LIVE MOBILITY BOARD</p>
            <h1 id="activeStopName">全港交通資訊台</h1>
            <p class="subtitle" id="boardSubtitle">選擇巴士、小巴或叫車，一個畫面完成搜尋、定位及出發。</p>
          </div>
          <div class="status-cluster">
            <span class="status-pill online" id="networkStatus">資料連線中</span>
            <span class="status-pill" id="refreshStatus">每 1 分鐘更新</span>
          </div>
        </header>

        <nav class="mode-grid" aria-label="交通模式">
          <button class="mode-card active bus" type="button" data-mode="bus">
            <span>巴士</span>
            <strong>九巴 / 龍運 / 城巴</strong>
            <small>全港路線、站點、ETA</small>
          </button>
          <button class="mode-card minibus" type="button" data-mode="minibus">
            <span>小巴</span>
            <strong>綠色小巴</strong>
            <small>路線、方向、班次資訊</small>
          </button>
          <button class="mode-card taxi" type="button" data-mode="taxi">
            <span>的士 / Uber</span>
            <strong>定位叫車</strong>
            <small>上車點、Uber、電召的士</small>
          </button>
        </nav>

        <section class="search-strip" aria-label="搜尋">
          <label class="search-box">
            <span id="searchLabel">搜尋巴士路線</span>
            <input id="globalSearch" autocomplete="off" placeholder="輸入 270A、101、尖沙咀、觀塘...">
          </label>
          <select id="operatorFilter" aria-label="營辦商">
            <option value="all">全部巴士</option>
            <option value="kmb">九巴 / 龍運</option>
            <option value="ctb">城巴</option>
          </select>
          <button id="refreshCatalog" type="button">更新資料</button>
        </section>

        <section class="content-grid">
          <article class="main-panel">
            <div class="panel-toolbar">
              <div>
                <p class="section-label" id="mainSectionLabel">巴士搜尋</p>
                <strong id="directionLabel">請先輸入路線</strong>
              </div>
              <select id="displayMode" aria-label="顯示方向">
                <option value="all">所有方向</option>
                <option value="outbound">只顯示去程</option>
                <option value="inbound">只顯示回程</option>
                <option value="favourites">常用路線</option>
              </select>
            </div>
            <div class="route-list" id="routeList" aria-live="polite"></div>
          </article>

          <aside class="side-stack">
            <article class="nearby-panel">
              <p class="section-label" id="sideSectionLabel">附近站點</p>
              <div id="nearbyStops">
                <p class="hint">先搜尋並選擇巴士路線；定位後會優先顯示最近的站。</p>
              </div>
            </article>

            <article class="weather-panel">
              <div>
                <p class="section-label">天氣及警告</p>
                <h2 id="weatherTemp">--°C</h2>
                <p id="weatherText">連接天文台中</p>
              </div>
              <div class="weather-meta">
                <span id="humidityText">濕度 --%</span>
                <span id="warningText">警告：--</span>
              </div>
            </article>

            <article class="countdown-panel">
              <p class="section-label">節日假期倒數</p>
              <h2 id="holidayCountdown">-- 日</h2>
              <p id="holidayName">計算下一個公眾假期</p>
            </article>
          </aside>
        </section>

        <footer class="display-footer">
          <span id="clockText">--:--:--</span>
          <span id="lastUpdated">最後更新：--</span>
          <span>資料：DATA.GOV.HK / 九巴 / 城巴 / 綠色小巴 / 天文台</span>
        </footer>
      </section>

      <aside class="admin-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">ADMIN</p>
            <h2>進階固定站點</h2>
          </div>
          <button class="icon-button" id="toggleSettings" type="button" aria-label="收合進階設定">⚙</button>
        </div>

        <div class="settings-body is-collapsed" id="settingsBody">
          <label class="field">
            <span>目前站點</span>
            <select id="stopSelect"></select>
          </label>

          <div class="field-row">
            <label class="field">
              <span>顯示名稱</span>
              <input id="stopNameInput" maxlength="28" placeholder="例如：公司樓下">
            </label>
            <label class="field">
              <span>營辦商</span>
              <select id="operatorInput">
                <option value="mixed">九巴 + 城巴</option>
                <option value="kmb">九巴 / 龍運</option>
                <option value="ctb">城巴</option>
                <option value="gmb">綠色小巴</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>九巴 / 龍運站點 ID</span>
            <input id="kmbStopInput" placeholder="例如 18492910339410B1">
          </label>

          <label class="field">
            <span>城巴站點 ID</span>
            <input id="ctbStopInput" placeholder="Citybus stop id">
          </label>

          <label class="field">
            <span>綠色小巴站點 / 備註</span>
            <input id="gmbStopInput" placeholder="可填小巴站名或日後 API stop id">
          </label>

          <label class="field">
            <span>常用路線，以逗號分隔</span>
            <input id="routesInput" placeholder="1, 6, 101, 970X, 56K">
          </label>

          <div class="button-row">
            <button id="saveStop" type="button">儲存站點</button>
            <button id="addStop" type="button">新增站點</button>
            <button id="deleteStop" type="button">刪除</button>
          </div>

          <div class="button-row">
            <button id="refreshNow" type="button">立即更新</button>
            <button id="demoData" type="button">示範資料</button>
          </div>

          <p class="hint">一般使用者只需要用三個主要入口；管理員可在這裡儲存固定站點。</p>
        </div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
